<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css" />
    <title>AI project</title>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>AI Danish Poem Generator</h1>
      </header>
      <main>
        <form>
          <input
            type="text"
            placeholder="Enter the topic of the Danish poem"
            id="topic-input"
            class="topic-input"
            autofocus
            required
          />
          <input type="submit" id="topic-submit" class="topic-submit" />
        </form>
        <div class="poem">
          Yellow skies
          <br />
          And nice ties
        </div>
      </main>
      <footer>
        <a
          href="https://github.com/saraliva4/SheCodes-AI-project"
          target="_blank"
          >Open-sourced code</a
        >
        by
        <a href="https://github.com/saraliva4" target="_blank">Sara Littauer</a>
        hosted on
        <a href="https://danish-ai-poems.netlify.app/" target="_blank"
          >Netlify</a
        >
      </footer>
      <script src="src/index.jss"></script>
    </div>
  </body>
</html>
